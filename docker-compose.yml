version: '3.1'
services:
  service_db:
    image: postgres:12
    environment:
      POSTGRES_USER: origo_fayzen
      POSTGRES_PASSWORD: P4#yH6@dV9xWq2F
      POSTGRES_DB: postgres
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - odoo-network

  service_odoo:
    image: odoo:17
    depends_on:
      - service_db
    environment:
      DB_HOST: service_db
      DB_PORT: 5432
      DB_USER: origo_fayzen
      DB_PASSWORD: P4#yH6@dV9xWq2F
    ports:
      - "8069:8069"
    volumes:
      - ./mnt/extra-addons:/mnt/extra-addons
      - ./etc:/etc/odoo
      - ./odoo-data:/var/lib/odoo
      - ./etc/odoo.conf:/etc/odoo/odoo.conf
    networks:
      - odoo-network

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: origo@gmail.com
      PGADMIN_DEFAULT_PASSWORD: P4#yH6@dV9xWq2F
    ports:
      - "8111:80"
    networks:
      - odoo-network

networks:
  odoo-network: